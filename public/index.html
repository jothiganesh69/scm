<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator V3</title>

<style>
body {
    background: #000;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Calculator */
.container {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 20px;
    width: 260px;
    margin-top: 50px;
}

.display {
    height: 60px;
    background: black;
    color: white;
    font-size: 28px;
    text-align: right;
    padding: 10px;
    margin-bottom: 15px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 50px;
    font-size: 16px;
}

.num { background: #333; color: white; }
.op { background: orange; color: white; }
.special { background: #a5a5a5; }

/* Login */
#login {
    margin-top: 100px;
}

/* History */
#historyBox {
    margin-top: 20px;
    color: white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2 style="color:white;">Login</h2>
    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <p id="msg"></p>
</div>

<!-- CALCULATOR -->
<div id="calculator" style="display:none;">
    <div class="container">

        <div class="display" id="display">0</div>

        <div class="buttons">
            <button class="special" onclick="clearDisplay()">C</button>
            <button class="special" onclick="deleteLast()">⌫</button>
            <button class="op" onclick="append('%')">%</button>
            <button class="op" onclick="append('/')">÷</button>

            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>
            <button class="op" onclick="append('*')">×</button>

            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>
            <button class="op" onclick="append('-')">−</button>

            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>
            <button class="op" onclick="append('+')">+</button>

            <button class="num" onclick="append('0')">0</button>
            <button class="num" onclick="append('.')">.</button>
            <button class="op" style="grid-column: span 2;" onclick="calculate()">=</button>
        </div>

        <br>
        <button onclick="showHistory()">Show History</button>

        <div id="historyBox">
            <h3>History</h3>
            <ul id="history"></ul>
        </div>

    </div>
</div>

<script>

// LOGIN
function login() {
    let user = username.value;
    let pass = password.value;

    if (user === "user1" && pass === "user123") {
        login.style.display = "none";
        calculator.style.display = "block";
    } else {
        msg.innerText = "Invalid Credentials";
    }
}

// CALCULATOR LOGIC
let expression = "";
let historyArr = [];

// INPUT
function append(value) {
    if (expression === "0") expression = "";
    expression += value;
    updateDisplay();
}

// CLEAR
function clearDisplay() {
    expression = "";
    updateDisplay();
}

// DELETE
function deleteLast() {
    expression = expression.slice(0, -1);
    updateDisplay();
}

// UPDATE DISPLAY
function updateDisplay() {
    display.innerText = expression || "0";
}

// CALCULATE + SAVE HISTORY
function calculate() {
    try {
        let result = eval(expression);

        // SAVE TO HISTORY
        historyArr.push(expression + " = " + result);

        expression = result.toString();
        updateDisplay();

    } catch {
        display.innerText = "Error";
    }
}

// SHOW HISTORY
function showHistory() {
    let list = document.getElementById("history");
    list.innerHTML = "";

    historyArr.slice().reverse().forEach(item => {
        let li = document.createElement("li");
        li.innerText = item;
        list.appendChild(li);
    });
}

</script>

</body>
</html>
