<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator V2</title>

<style>
body {
    background: #000;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Calculator Container */
.container {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 20px;
    width: 260px;
}

/* Display */
.display {
    width: 100%;
    height: 60px;
    background: black;
    color: white;
    font-size: 28px;
    text-align: right;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 50px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.num { background: #333; color: white; }
.op { background: orange; color: white; }
.special { background: #a5a5a5; }

/* Login */
#login {
    position: absolute;
    background: #1c1c1c;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

.error {
    color: red;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2 style="color:white;">Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
</div>

<!-- CALCULATOR -->
<div class="container" id="calculator" style="display:none;">
    <div class="display" id="display">0</div>

    <div class="buttons">
        <button class="special" onclick="clearDisplay()">C</button>
        <button class="special" onclick="deleteLast()">⌫</button>
        <button class="op" onclick="append('%')">%</button>
        <button class="op" onclick="append('/')">÷</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('*')">×</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('-')">−</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="op" onclick="append('+')">+</button>

        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="op" style="grid-column: span 2;" onclick="calculate()">=</button>
    </div>
</div>

<script>

// LOGIN FUNCTION
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    if (user === "user1" && pass === "user123") {
        document.getElementById("login").style.display = "none";
        document.getElementById("calculator").style.display = "block";
    } else {
        msg.innerText = "Invalid Credentials";
        msg.className = "error";
    }
}

// CALCULATOR LOGIC
let expression = "";

// Add input
function append(value) {
    if (expression === "0") expression = "";
    expression += value;
    updateDisplay();
}

// Clear display
function clearDisplay() {
    expression = "";
    updateDisplay();
}

// Delete last character
function deleteLast() {
    expression = expression.slice(0, -1);
    updateDisplay();
}

// Update display
function updateDisplay() {
    document.getElementById("display").innerText = expression || "0";
}

// Calculate result
function calculate() {
    try {
        expression = eval(expression).toString();
        updateDisplay();
    } catch {
        document.getElementById("display").innerText = "Error";
    }
}

</script>

</body>
</html>
